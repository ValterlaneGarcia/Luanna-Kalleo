<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chá Revelação · Luana ou Kalleo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stage-outer">
  <div class="stage" id="stage">

    <!-- AMBIENT BACKGROUND -->
    <div class="bg-layer">
      <div class="cloud pink c1"></div>
      <div class="cloud pink c2"></div>
      <div class="cloud blue c3"></div>
      <div class="cloud blue c4"></div>
      <div class="cloud pink c5"></div>
      <div class="cloud blue c6"></div>

      <div class="star" style="width:16px;height:16px; top:9%; left:12%; animation-delay:.2s;">★</div>
      <div class="star" style="width:12px;height:12px; top:20%; left:24%; animation-delay:1.4s;">★</div>
      <div class="star" style="width:14px;height:14px; top:8%; right:14%; animation-delay:.8s;">★</div>
      <div class="star" style="width:10px;height:10px; top:22%; right:26%; animation-delay:2.1s;">★</div>
      <div class="star" style="width:13px;height:13px; bottom:14%; left:10%; animation-delay:1.1s;">★</div>
      <div class="star" style="width:11px;height:11px; bottom:22%; left:20%; animation-delay:.4s;">★</div>
      <div class="star" style="width:14px;height:14px; bottom:13%; right:11%; animation-delay:1.7s;">★</div>
      <div class="star" style="width:10px;height:10px; bottom:24%; right:22%; animation-delay:.6s;">★</div>

      <!-- fireflies / floating light specks -->
      <div class="firefly" style="width:6px;height:6px; top:28%; left:16%; animation-delay:.4s;"></div>
      <div class="firefly" style="width:8px;height:8px; top:38%; left:78%; animation-delay:2.1s;"></div>
      <div class="firefly" style="width:5px;height:5px; top:55%; left:8%; animation-delay:3.6s;"></div>
      <div class="firefly" style="width:7px;height:7px; top:62%; left:88%; animation-delay:1.2s;"></div>
      <div class="firefly" style="width:6px;height:6px; top:45%; left:50%; animation-delay:4.4s;"></div>
      <div class="firefly" style="width:5px;height:5px; top:18%; left:60%; animation-delay:5.2s;"></div>
      <div class="firefly" style="width:7px;height:7px; top:72%; left:34%; animation-delay:2.8s;"></div>
      <div class="firefly" style="width:6px;height:6px; top:33%; left:30%; animation-delay:6.6s;"></div>

      <!-- falling petals -->
      <div class="petal" style="width:14px; top:-4%; left:14%; animation-delay:.5s;">
        <svg viewBox="0 0 24 24"><path d="M12 2c4 3 6 7 6 10a6 6 0 0 1-12 0c0-3 2-7 6-10z" fill="#f3aac1" opacity=".8"/></svg>
      </div>
      <div class="petal" style="width:10px; top:-4%; left:62%; animation-delay:3.2s;">
        <svg viewBox="0 0 24 24"><path d="M12 2c4 3 6 7 6 10a6 6 0 0 1-12 0c0-3 2-7 6-10z" fill="#a9cbe6" opacity=".8"/></svg>
      </div>
      <div class="petal" style="width:12px; top:-4%; left:38%; animation-delay:6.4s;">
        <svg viewBox="0 0 24 24"><path d="M12 2c4 3 6 7 6 10a6 6 0 0 1-12 0c0-3 2-7 6-10z" fill="#f3aac1" opacity=".7"/></svg>
      </div>
      <div class="petal" style="width:9px; top:-4%; left:84%; animation-delay:8.1s;">
        <svg viewBox="0 0 24 24"><path d="M12 2c4 3 6 7 6 10a6 6 0 0 1-12 0c0-3 2-7 6-10z" fill="#a9cbe6" opacity=".75"/></svg>
      </div>

      <!-- soft watermark herons referencing the Garcia crest -->
      <div class="heron-mark" style="width:64px; top:34%; left:6%; animation-delay:.5s;">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M14 50c4-10 8-16 8-24 0-7-4-11-4-11s7 1 10 7c2-5 7-8 7-8s-2 6-1 11c4-2 9-1 9-1s-6 4-7 9c5 1 9 5 9 5s-7-1-11 1c2 5 1 10 1 10"/>
          <circle cx="18" cy="14" r="1.4" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div class="heron-mark" style="width:54px; bottom:30%; right:7%; animation-delay:2.5s;">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M14 50c4-10 8-16 8-24 0-7-4-11-4-11s7 1 10 7c2-5 7-8 7-8s-2 6-1 11c4-2 9-1 9-1s-6 4-7 9c5 1 9 5 9 5s-7-1-11 1c2 5 1 10 1 10"/>
          <circle cx="18" cy="14" r="1.4" fill="currentColor" stroke="none"/>
        </svg>
      </div>

      <div class="balloon-cluster" style="top:4%; left:2%; animation-delay:.1s;">
        <div class="balloon" style="width:22px;height:28px;background:#f3a9c0;"></div>
        <div class="balloon" style="width:18px;height:24px;background:#e08aa6; margin-top:6px;"></div>
        <div class="balloon" style="width:14px;height:18px;background:#f6c4d3; margin-top:10px;"></div>
      </div>
      <div class="balloon-cluster" style="top:3%; right:3%; animation-delay:1s;">
        <div class="balloon" style="width:14px;height:18px;background:#bcd9ee; margin-top:10px;"></div>
        <div class="balloon" style="width:18px;height:24px;background:#9bc2e0; margin-top:5px;"></div>
        <div class="balloon" style="width:22px;height:28px;background:#cfe4f2;"></div>
      </div>

      <!-- ribbon swirl accents -->
      <svg class="ribbon-swirl" style="width:40px; top:46%; left:4%; animation-delay:.8s;" viewBox="0 0 64 64">
        <path d="M6 32c6-14 20-18 28-10s4 22-10 24-22-10-14-20" fill="none" stroke="#e6cfa0" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <svg class="ribbon-swirl" style="width:34px; bottom:34%; left:80%; animation-delay:2.4s;" viewBox="0 0 64 64">
        <path d="M6 32c6-14 20-18 28-10s4 22-10 24-22-10-14-20" fill="none" stroke="#e89cb4" stroke-width="3" stroke-linecap="round"/>
      </svg>

      <svg class="pacifier" style="width:34px; bottom:6%; right:8%; animation-delay:.7s;" viewBox="0 0 64 64">
        <circle cx="22" cy="22" r="14" fill="#bcd9ee"/>
        <circle cx="22" cy="22" r="14" fill="none" stroke="#9bc2e0" stroke-width="2"/>
        <rect x="30" y="14" width="16" height="16" rx="8" fill="#e6cfa0"/>
        <path d="M40 30 q10 4 4 16 q-8 8 -16 0" fill="none" stroke="#e6cfa0" stroke-width="4" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- ENVELOPE -->
    <div class="envelope-scene" id="envelopeScene">
      <div class="envelope-hit" id="envelopeHit">
        <div class="tilt-layer" id="tiltEnvelope">
        <div class="envelope-visual" id="envelopeVisual">
        <div class="tap-ring"></div>
        <div class="tap-ring r2"></div>
        <div class="env-shadow"></div>
        <div class="envelope">
          <div class="env-clip">
            <div class="env-pocket"></div>
          </div>
          <div class="env-front">
            <svg viewBox="0 0 240 137" preserveAspectRatio="none">
              <polygon points="0,0 240,0 120,82" fill="#f3e3c9"/>
            </svg>
          </div>
          <div class="env-side-l"></div>
          <div class="env-side-r"></div>
        <div class="letter-card" id="letterCard"></div>
          <div class="env-glow"></div>
          <div class="env-flap" id="envFlap"></div>
          <div class="seal" id="seal">
            <svg viewBox="0 0 64 64" fill="none" stroke="#fff0f4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 50c4-10 8-16 8-24 0-7-4-11-4-11s7 1 10 7c2-5 7-8 7-8s-2 6-1 11c4-2 9-1 9-1s-6 4-7 9c5 1 9 5 9 5s-7-1-11 1c2 5 1 10 1 10"/>
              <circle cx="20" cy="14" r="1.6" fill="#fff0f4" stroke="none"/>
            </svg>
          </div>
        </div>
        <div class="sparkle sp1"></div>
        <div class="sparkle sp2"></div>
        <div class="sparkle sp3"></div>
        <div class="sparkle sp4"></div>
        <div class="sparkle sp5"></div>
        </div>
        </div>
      </div>

      <div class="cta-wrap">
        <p class="cta-main">Você recebeu uma carta especial</p>
      </div>
    </div>

    <!-- FOLDER -->
    <div class="folder-wrap" id="folderWrap">
      <div class="folder-stage-area">
        <div class="folder" id="folder">
          <div class="page page-left">
            <img src="img/convite.jpeg" alt="" srcset="">
          </div>
          <div class="page page-right" id="pageRight">
            <img src="img/presentes.jpeg" alt="" srcset="">
          </div>
          <div class="fold-seam" id="foldSeam"></div>
        </div>
      </div>
      <div class="address-block" id="addressBlock">
        <p>Endereço: Rua das Margaridas - Parque Santa Rosa</p>
        <p>643A - Altos</p>
      </div>
      <button class="replay-btn" id="replayBtn">↺ Abrir novamente</button>
    </div>

  </div>
</div>
<script src="script.js"></script>
</body>
</html>
